---
# IRSA / OIDC variables for ROSA (override via inventory or extra-vars)
# Replace the placeholder values before running the playbook, or pass via -e @vars.yml

# AWS account and region used to construct the OIDC provider ARN
aws_account_id: "<REPLACE ME>"
aws_region: "us-east-2"

# IRSA Kubernetes namespace and service account names for KB role
irsa_namespace_kb: "ic-user-projects"
irsa_serviceaccount_kb: "project-creator"

irsa_namespace_user: "user*"
irsa_serviceaccount_user: "my-workbench"
