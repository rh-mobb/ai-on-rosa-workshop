---
# Fetch OIDC provider id from ROSA/OpenShift cluster and set `oidc_provider_id` fact.
# Requires one of:
# - `rosa_kubeconfig_content` (full kubeconfig YAML string)
# - `rosa_kubeconfig_path` (path on controller to kubeconfig)
# - `rosa_api_server` + `rosa_token` (+ optionally `rosa_ca_cert`) and `oc` installed

- name: Debug Variables at start of fetch_oidc
  ansible.builtin.debug:
    msg: "rosa_kubeconfig_content='{{ rosa_kubeconfig_content | default('undefined') }}' rosa_kubeconfig_path='{{ rosa_kubeconfig_path | default('undefined') }}' rosa_api_server='{{ rosa_api_server | default('undefined') }}' rosa_token='{{ (rosa_token | default('undefined')) if (rosa_token is defined) else 'undefined' }}'"
  when: (rosa_token is defined and rosa_token is not none and (rosa_token | trim) != '') and (rosa_api_server is defined and rosa_api_server is not none and (rosa_api_server | trim) != '')

- name: Write provided kubeconfig content to disk
  ansible.builtin.copy:
    content: "{{ rosa_kubeconfig_content }}"
    dest: "{{ playbook_dir }}/.rosa_kubeconfig"
    mode: '0600'
  when: rosa_kubeconfig_content is defined and rosa_kubeconfig_content is not none and (rosa_kubeconfig_content | trim) != ''

- name: Set kubeconfig path when path provided
  ansible.builtin.set_fact:
    kubeconfig_path: "{{ rosa_kubeconfig_path }}"
  when: rosa_kubeconfig_path is defined and rosa_kubeconfig_path is not none and (rosa_kubeconfig_path | trim) != ''

- name: Set kubeconfig path to written file
  ansible.builtin.set_fact:
    kubeconfig_path: "{{ playbook_dir }}/.rosa_kubeconfig"
  when: rosa_kubeconfig_path is not defined or rosa_kubeconfig_path is none or (rosa_kubeconfig_path | trim) == ''

- name: Attempt to login with oc using token (if provided) and set kubeconfig
  ansible.builtin.command:
    cmd: >-
      oc login --kubeconfig={{ kubeconfig_path }} --token={{ rosa_token }} --server={{ rosa_api_server }} --insecure-skip-tls-verify
  register: oc_login
  changed_when: false
  failed_when: oc_login.rc != 0
  when: (rosa_token is defined and rosa_token is not none and (rosa_token | trim) != '') and (rosa_api_server is defined and rosa_api_server is not none and (rosa_api_server | trim) != '') and (kubeconfig_path is defined)

- name: Set kubeconfig_path to default kubeconfig if oc login used
  ansible.builtin.set_fact:
    kubeconfig_path: "{{ playbook_dir }}/.rosa_kubeconfig"
  when: (rosa_token is defined and rosa_token is not none and (rosa_token | trim) != '') and (rosa_api_server is defined and rosa_api_server is not none and (rosa_api_server | trim) != '') and (kubeconfig_path is not defined)

- name: Fail if no kubeconfig method available
  ansible.builtin.fail:
    msg: "No ROSA credentials provided; set rosa_kubeconfig_content, rosa_kubeconfig_path, or rosa_token+rosa_api_server."
  when: kubeconfig_path is not defined
- name: Query OpenShift authentication config for serviceAccountIssuer
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig={{ kubeconfig_path }} get authentication.config.openshift.io/cluster -o jsonpath={.spec.serviceAccountIssuer}
  register: oidc_issuer
  failed_when: oidc_issuer.rc != 0
  changed_when: false

- name: Set OIDC issuer raw and provider name
  ansible.builtin.set_fact:
    oidc_issuer_raw: "{{ oidc_issuer.stdout }}"
    oidc_provider_name: "{{ (oidc_issuer.stdout | regex_replace('^https?://','')) }}"
  when: oidc_issuer.stdout is defined

- name: Set OIDC provider id from provider name
  ansible.builtin.set_fact:
    oidc_provider_id: "{{ (oidc_provider_name.split('/')[-1]) }}"
  when: oidc_provider_name is defined

- name: Debug OIDC issuer and provider
  ansible.builtin.debug:
    msg: "OIDC issuer='{{ oidc_issuer_raw }}' provider_name='{{ oidc_provider_name }}' provider_id='{{ oidc_provider_id }}'"
  when: oidc_provider_name is defined
